name: CI — EduChat

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  PIP_CACHE_DIR: ~/.cache/pip

# ═══════════════════════════════════════════════════════════════════
# JOB 1 — VÉRIFICATION SYNTAXE
# ═══════════════════════════════════════════════════════════════════
jobs:

  syntax-check:
    name: "① Syntaxe (Python + JS)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Python ───────────────────────────────────────────────────
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Vérifier syntaxe Python
        run: |
          echo "=== Python : fichiers racine ==="
          python -m py_compile main.py mon_chatbot.py
          echo " main.py, mon_chatbot.py"

          echo "=== Python : package chatbot/ ==="
          for f in chatbot/*.py; do python -m py_compile "$f" && echo "$f"; done

          echo "=== Python : package api/ ==="
          for f in api/*.py; do python -m py_compile "$f" && echo " $f"; done

          echo "=== Python : dossier tests/ ==="
          for f in tests/*.py; do python -m py_compile "$f" && echo "$f"; done

      # ── JavaScript ───────────────────────────────────────────────
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Vérifier syntaxe JavaScript
        run: |
          echo "=== JavaScript : dossier static/ ==="
          JS_FILES=$(find static/ -name "*.js" 2>/dev/null || true)
          if [ -z "$JS_FILES" ]; then
            echo "ℹ️  Aucun fichier .js trouvé dans static/"
          else
            for f in $JS_FILES; do node --check "$f" && echo "$f"; done
          fi

  # ═══════════════════════════════════════════════════════════════════
  # JOB 2 — QUALITÉ DU CODE
  # ═══════════════════════════════════════════════════════════════════
  code-quality:
    name: "② Qualité (black + flake8 + radon)"
    runs-on: ubuntu-latest
    needs: syntax-check

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer outils qualité
        run: pip install --upgrade pip black flake8 radon

      - name: Black — formatage
        run: |
          echo "=== Black ==="
          black --check --diff chatbot/ api/ main.py mon_chatbot.py
          echo "✅ Black OK"
        continue-on-error: true

      - name: Flake8 — style & erreurs
        run: |
          echo "=== Flake8 ==="
          flake8 chatbot/ api/ main.py mon_chatbot.py \
            --max-line-length=170 \
            --ignore=E203,W503,E501 \
            --exclude=__pycache__,venv,.venv \
            --statistics --count
          echo "✅ Flake8 OK"
        continue-on-error: true

      - name: Radon — complexité & maintenabilité
        run: |
          echo "=== Complexité cyclomatique ==="
          radon cc chatbot/ api/ main.py -s -a
          echo "=== Indice de maintenabilité ==="
          radon mi chatbot/ api/ main.py -s
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════
  # JOB 3 — TESTS UNITAIRES
  # ═══════════════════════════════════════════════════════════════════
  unit-tests:
    name: "③ Tests unitaires (pytest)"
    runs-on: ubuntu-latest
    needs: syntax-check  
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer dépendances
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-cov

      - name: Télécharger modèle spaCy
        run: python -m spacy download en_core_web_sm

      - name: Lancer les tests unitaires
        run: |
          pytest tests/test_text_utils.py \
                 tests/test_executor.py \
                 tests/test_corpus.py \
                 tests/test_quiz.py \
                 tests/test_brain.py \
                 -v --tb=short \
                 --cov=chatbot \
                 --cov-report=term-missing \
                 --cov-report=html \
                 --cov-report=xml:coverage-unit.xml

      - name: Sauvegarder rapport coverage HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit-html
          path: htmlcov/

      - name: Sauvegarder coverage XML (pour SonarCloud)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-xml
          path: coverage-unit.xml

  # ═══════════════════════════════════════════════════════════════════
  # JOB 4 — TESTS D'INTÉGRATION
  # ═══════════════════════════════════════════════════════════════════
  integration-tests:
    name: "④ Tests d'intégration (API FastAPI)"
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer dépendances
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-cov httpx

      - name: Télécharger modèle spaCy
        run: python -m spacy download en_core_web_sm

      - name: Tests d'intégration API
        run: |
          pytest tests/test_api.py \
                 -v --tb=short \
                 --cov=api --cov=main \
                 --cov-report=term-missing \
                 --cov-report=xml:coverage-integration.xml

      - name: Coverage globale (tous modules)
        run: |
          pytest tests/ -v \
                 --cov=chatbot --cov=api --cov=main \
                 --cov-report=xml:coverage-global.xml \
                 --cov-report=term-missing

      - name: Sauvegarder coverage XML globale (pour SonarCloud)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-global-xml
          path: coverage-global.xml

  # ═══════════════════════════════════════════════════════════════════
  # JOB 5 — SONARCLOUD
  # ═══════════════════════════════════════════════════════════════════
  sonar:
    name: "⑤ Analyse SonarCloud"
    runs-on: ubuntu-latest
    needs: [code-quality, integration-tests]  

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   

      - name: Setup Java 17 (requis par le scanner Sonar)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Télécharger coverage XML globale
        uses: actions/download-artifact@v4
        with:
          name: coverage-global-xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=DhekraBalbouli_Educhat_Project_DEVOPS
            -Dsonar.organization=dhekrabalbouli
            -Dsonar.python.coverage.reportPaths=coverage-global.xml