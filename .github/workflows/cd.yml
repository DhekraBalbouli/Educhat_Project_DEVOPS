name: CD — EduChat

on:
  workflow_run:
    workflows: ["CI — EduChat"]
    types: [completed]
    branches: [main]

jobs:

  build-push:
    name: "⑥ Build & Push Docker Hub"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build les 3 images
        run: docker compose build

      - name: Push les 3 images sur Docker Hub
        run: docker compose push

      - name: Résumé
        run: |
          echo "## 🐳 Images publiées sur Docker Hub" >> $GITHUB_STEP_SUMMARY
          echo "- dhekrabalbouli/educhat-frontend:latest" >> $GITHUB_STEP_SUMMARY
          echo "- dhekrabalbouli/educhat-backend:latest" >> $GITHUB_STEP_SUMMARY
          echo "- dhekrabalbouli/educhat-db:latest" >> $GITHUB_STEP_SUMMARY
  
# ═══════════════════════════════════════════════════════════════════
# JOB 2 — DÉPLOIEMENT SUR SELF-HOSTED RUNNER (Codespaces)
# ═══════════════════════════════════════════════════════════════════
  deploy:
    name: "⑦ Déploiement (self-hosted runner)"
    runs-on: self-hosted
    needs: build-push
    environment:
      name: staging
      url: https://friendly-space-yodel-7vjvpg65pwrg3r7v-80.app.github.dev/
    defaults:
      run:
        working-directory: /workspaces/Educhat_Project_DEVOPS
 
    steps:
      - name: Pull les nouvelles images depuis Docker Hub
        run: docker compose pull
 
      - name: Arrêter les anciens conteneurs
        run: docker compose down --remove-orphans
 
      - name: Lancer les nouveaux conteneurs
        run: docker compose up -d
 
      - name: Résumé déploiement
        run: |
          echo "## 🚀 Site déployé sur Codespaces" >> $GITHUB_STEP_SUMMARY
          echo "- docker compose up -d ✅" >> $GITHUB_STEP_SUMMARY
      - name: 🌍 Lien EduChat déployé
        run: |
          echo "EduChat est déployé avec succès !" >> $GITHUB_STEP_SUMMARY
          echo "👉 https://friendly-space-yodel-7vjvpg65pwrg3r7v-80.app.github.dev/" >> $GITHUB_STEP_SUMMARY

performance:
    name: "⑧ Tests de performance (Sitespeed.io)"
    runs-on: ubuntu-latest
    needs: deploy
    
    steps:
      - name: Attendre que l'application soit disponible
        run: |
          URL="https://friendly-space-yodel-7vjvpg65pwrg3r7v-80.app.github.dev/"
          for i in $(seq 1 30); do
            STATUS=$(curl -k -s -o /dev/null -w "%{http_code}" "$URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Application disponible !"
              break
            fi
            echo "Tentative $i/30..."
            sleep 10
          done

      - name: Créer le dossier de résultats
        run: mkdir -p sitespeed-results

      - name: Lancer Sitespeed.io
        run: |
          docker run --rm --shm-size=1g \
            -v "$(pwd):/sitespeed.io" \
            sitespeedio/sitespeed.io:latest \
            --outputFolder sitespeed-results \
            "https://friendly-space-yodel-7vjvpg65pwrg3r7v-80.app.github.dev/"

      - name: Sauvegarder les résultats
        uses: actions/upload-artifact@v4
        with:
          name: sitespeed-results
          path: sitespeed-results/
          retention-days: 7

      - name: Résumé performance
        run: |
          echo "## ⚡ Tests de performance terminés" >> $GITHUB_STEP_SUMMARY
          echo "- Sitespeed.io ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Résultats disponibles dans les artifacts" >> $GITHUB_STEP_SUMMARY